<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CadDraw</title>
  <meta name="theme-color" content="#111827" />
  <meta name="description" content="CadDraw - üvegtervező rajzoló és exportáló alkalmazás" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <h1>Üvegtervező</h1>

      <div class="panel">
        <h2>Külső forma</h2>

        <label for="shapeType">Sablon</label>
        <select id="shapeType">
          <option value="rectangle">Téglalap</option>
          <option value="trapezoid">Trapéz</option>
        </select>

        <label for="glassThickness">Vastagság (mm)</label>
        <input type="number" id="glassThickness" min="1" value="8" />

        <div id="rectangleFields" class="shape-fields">
          <label for="rectWidth">Szélesség (mm)</label>
          <input type="number" id="rectWidth" min="1" value="1000" />

          <label for="rectHeight">Magasság (mm)</label>
          <input type="number" id="rectHeight" min="1" value="600" />
        </div>

        <div id="trapezoidFields" class="shape-fields hidden">
          <label for="trapMode">Trapéz típusa</label>
          <select id="trapMode">
           <option value="normal" selected>Normál trapéz</option>
           <option value="rightAngle">90°-os trapéz</option>
           <option value="free">Szabad trapéz</option>
        </select>
        <div id="trapNormalFields">
          <label for="trapTop">Felső oldal (mm)</label>
          <input type="number" id="trapTop" min="1" value="800" />

          <label for="trapBottom">Alsó oldal (mm)</label>
          <input type="number" id="trapBottom" min="1" value="1000" />

          <label for="trapHeight">Magasság (mm)</label>
          <input type="number" id="trapHeight" min="1" value="600" />

          <label for="trapAlign">Igazítás</label>
          <select id="trapAlign">
            <option value="left">Balra zárt</option>
            <option value="center" selected>Középre zárt</option>
            <option value="right">Jobbra zárt</option>
          </select>
        </div>

        <div id="trapRightAngleFields" class="hidden">
          <label for="trapTopRA">Felső oldal (mm)</label>
          <input type="number" id="trapTopRA" min="1" value="800" />

          <label for="trapBottomRA">Alsó oldal (mm)</label>
          <input type="number" id="trapBottomRA" min="1" value="1000" />

          <label for="trapLeft">Bal oldal (mm)</label>
          <input type="number" id="trapLeft" min="1" value="600" />

          <label for="trapRight">Jobb oldal (mm)</label>
          <input type="number" id="trapRight" min="1" value="632" />

          <label for="trapRightAngleSide">90°-os oldal</label>
          <select id="trapRightAngleSide">
            <option value="left" selected>Bal oldal</option>
            <option value="right">Jobb oldal</option>
          </select>
        </div>

      <div id="trapFreeFields" class="hidden">
        <label for="trapFreeTop">Felső oldal (mm)</label>
        <input type="number" id="trapFreeTop" min="1" value="800" />

        <label for="trapFreeBottom">Alsó oldal (mm)</label>
        <input type="number" id="trapFreeBottom" min="1" value="1000" />

        <label for="trapFreeLeft">Bal oldal (mm)</label>
        <input type="number" id="trapFreeLeft" min="1" value="650" />

        <label for="trapFreeRight">Jobb oldal (mm)</label>
        <input type="number" id="trapFreeRight" min="1" value="650" />

        <label for="trapFreeAlign">Szabad trapéz döntése</label>
        <select id="trapFreeAlign">
          <option value="auto" selected>Automatikus</option>
          <option value="left">Balra döntött</option>
          <option value="center">Középre igazított</option>
          <option value="right">Jobbra döntött</option>
        </select>
      </div>
        
    </div> 

        <button id="drawBtn">Frissítés</button>
      </div>

      <div class="panel">
        <h2>Furatok</h2>

        <label for="holeX">X (mm)</label>
        <input type="number" id="holeX" min="0" value="150" />

        <label for="holeY">Y (mm)</label>
        <input type="number" id="holeY" min="0" value="150" />

        <label for="holeD">Átmérő (mm)</label>
        <input type="number" id="holeD" min="1" value="30" />

        <button id="addHoleBtn">Furat hozzáadása</button>

        <div id="holeList" class="list"></div>
      </div>

      <div class="panel">
        <h2>Kivágások</h2>

        <label for="cutoutType">Kivágás típusa</label>
        <select id="cutoutType">
          <option value="rectangle">Téglalap</option>
          <option value="lcorner">L alakú sarokkivágás</option>
          <option value="ucutout">U alakú élkivágás</option>
        </select>

        <div id="rectCutoutFields">
  <label for="cutoutRectMode">Megadási mód</label>
  <select id="cutoutRectMode">
    <option value="size" selected>X + Y + szélesség + magasság</option>
    <option value="edgeOffsets">Széltávolságokból</option>
    <option value="reference">Referencia méretekből (CAD)</option>
  </select>

  <div id="cutoutRectSizeFields">
  <label for="cutoutX">X (mm)</label>
  <input type="number" id="cutoutX" min="0" value="300" />

  <label for="cutoutY">Y (mm)</label>
  <input type="number" id="cutoutY" min="0" value="100" />

  <label for="cutoutW">Szélesség (mm)</label>
  <input type="number" id="cutoutW" min="1" value="120" />

  <label for="cutoutH">Magasság (mm)</label>
  <input type="number" id="cutoutH" min="1" value="80" />
</div>

  <div id="cutoutRectEdgeFields" class="hidden">
    <label for="cutoutLeftGap">Bal szél → kivágás bal széle (mm)</label>
    <input type="number" id="cutoutLeftGap" min="0" value="300" />

    <label for="cutoutRightGap">Jobb szél → kivágás jobb széle (mm)</label>
    <input type="number" id="cutoutRightGap" min="0" value="580" />

    <label for="cutoutBottomGap">Alsó szél → kivágás alsó széle (mm)</label>
    <input type="number" id="cutoutBottomGap" min="0" value="100" />

    <label for="cutoutTopGap">Felső szél → kivágás felső széle (mm)</label>
    <input type="number" id="cutoutTopGap" min="0" value="420" />
  </div>
  
  <div id="cutoutRectReferenceFields" class="hidden">
    <label>Bal szél → kivágás bal (mm)</label>
    <input type="number" id="cutoutRefLeft" value="110" />

    <label>Bal szél → kivágás jobb (mm)</label>
    <input type="number" id="cutoutRefRight" value="292" />

    <label>Alsó szél → kivágás alsó (mm)</label>
    <input type="number" id="cutoutRefBottom" value="243" />

    <label>Alsó szél → kivágás felső (mm)</label>
    <input type="number" id="cutoutRefTop" value="308" />
  </div>

  <label for="cutoutR">Sarok sugár (mm)</label>
  <input type="number" id="cutoutR" min="0" value="0" />
</div>

        <div id="lCutoutFields" class="hidden">
          <label for="lCutoutW">Szélesség (mm)</label>
          <input type="number" id="lCutoutW" min="1" value="120" />

          <label for="lCutoutH">Magasság (mm)</label>
          <input type="number" id="lCutoutH" min="1" value="80" />

          <label for="lInnerR">Belső sugár (mm)</label>
          <input type="number" id="lInnerR" min="0" value="10" />

          <label for="lCorner">Sarok helye</label>
          <select id="lCorner">
            <option value="topRight" selected>Jobb felső</option>
            <option value="topLeft">Bal felső</option>
            <option value="bottomRight">Jobb alsó</option>
            <option value="bottomLeft">Bal alsó</option>
          </select>
        </div>

 <div id="uCutoutFields" class="hidden">
  <label for="uSide">Oldal</label>
  <select id="uSide">
    <option value="bottom" selected>Alsó oldal</option>
    <option value="top">Felső oldal</option>
    <option value="left">Bal oldal</option>
    <option value="right">Jobb oldal</option>
  </select>

  <label for="uOffset">Kezdő távolság az oldalon (mm)</label>
  <input type="number" id="uOffset" min="0" value="200" />

  <label for="uWidth">Nyílás / belső oldal szélesség (mm)</label>
  <input type="number" id="uWidth" min="1" value="120" />

  <label for="uDepth">Mélység (mm)</label>
  <input type="number" id="uDepth" min="1" value="80" />

  <label for="uRadius">Két belső sarok közös R sugara (mm)</label>
  <input type="number" id="uRadius" min="0" value="10" />
</div>       

        <button id="addCutoutBtn">Kivágás hozzáadása</button>

        <div id="cutoutList" class="list"></div>
      </div>
      <div class="panel">
        <h2>Ráhagyás</h2>

        <label for="holeAllowance">Furat ráhagyás (mm)</label>
        <input type="number" id="holeAllowance" step="0.1" value="1" />

        <label for="cutoutAllowance">Kivágás ráhagyás oldalanként (mm)</label>
        <input type="number" id="cutoutAllowance" step="0.1" value="0.5" />
      </div>
      
      <div class="panel">
        <h2>Export</h2>
        <button id="exportPdfBtn">PDF export</button>
        <button id="exportDxfBtn">DXF export</button>
      </div>

      <div class="panel">
        <h2>Információ</h2>
        <div id="statusBox" class="status ok">Kész.</div>
      </div>
    </div>

    <div class="workspace">
      <canvas id="glassCanvas" width="1000" height="700"></canvas>
    </div>
  </div>

  <script src="vendor/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
